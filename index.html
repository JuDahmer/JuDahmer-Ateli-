<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ju Dahmer Ateliê | Coleção Especial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --verde-institucional: #879670;
            --fundo-site: #FAF9F6;
            --texto-principal: #2C3E2D;
            --texto-secundario: #7A7A7A;
            --detalhe-dourado: #D4AF37;
            --transicao-suave: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--fundo-site);
            color: var(--texto-principal);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .fade-in { opacity: 0; transform: translateY(20px); transition: var(--transicao-suave); }
        .fade-in.visible { opacity: 1; transform: translateY(0); }

        header {
            background-color: var(--verde-institucional);
            padding: 50px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-container img { max-width: 200px; height: auto; margin-bottom: 20px; }
        .divisor-header { width: 80px; height: 1px; background-color: var(--detalhe-dourado); margin: 20px 0; }
        
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: white; margin-bottom: 12px; font-weight: 400; letter-spacing: 1px; }
        h2 { font-size: 0.8rem; color: rgba(255, 255, 255, 0.85); letter-spacing: 6px; text-transform: uppercase; font-weight: 300; }

        .main-container { max-width: 1200px; margin: 80px auto; padding: 0 24px; min-height: 50vh;}
        
        .product-grid { display: grid; gap: 48px; grid-template-columns: 1fr; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }

        .card { background: white; border-radius: 4px; overflow: hidden; transition: var(--transicao-suave); display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 50px rgba(0,0,0,0.08); }
        
        .image-box { width: 100%; aspect-ratio: 4 / 5; overflow: hidden; background-color: #f8f8f8; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; transition: var(--transicao-suave); }
        .card:hover .image-box img { transform: scale(1.05); }

        .info-box { padding: 30px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .product-name { font-family: 'Playfair Display', serif; font-size: 1.25rem; margin-bottom: 12px; color: var(--texto-principal); font-weight: 400; }
        .divisor-card { width: 40px; height: 1px; background-color: var(--detalhe-dourado); margin: 12px 0; opacity: 0.6; }
        .product-price { font-size: 1.1rem; font-weight: 400; color: var(--texto-secundario); margin-bottom: 25px; }

        .btn-whatsapp { display: flex; align-items: center; justify-content: center; background-color: transparent; color: var(--verde-institucional); border: 1.5px solid var(--verde-institucional); padding: 14px 20px; text-decoration: none; font-size: 0.85rem; letter-spacing: 2.5px; text-transform: uppercase; transition: var(--transicao-suave); width: 100%; font-weight: 500; }
        .btn-whatsapp:hover { background-color: var(--verde-institucional); color: white; }

        .whatsapp-float { position: fixed; bottom: 40px; right: 40px; background-color: white; color: var(--verde-institucional); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15); text-decoration: none; z-index: 9999; transition: var(--transicao-suave); border: 1px solid var(--verde-institucional); }
        .whatsapp-float:hover { transform: scale(1.15) rotate(5deg); }

        footer { padding: 100px 20px; text-align: center; background-color: white; border-top: 1px solid rgba(212, 175, 55, 0.1); }
        .footer-text { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-style: italic; margin-bottom: 15px; }
        .footer-sub { font-size: 0.85rem; letter-spacing: 4px; text-transform: uppercase; color: var(--detalhe-dourado); font-weight: 400; }
        .heart-icon { display: inline-block; margin-top: 15px; font-size: 1.2rem; color: var(--verde-institucional); }
        
        .loading { text-align: center; width: 100%; font-size: 1.2rem; color: var(--verde-institucional); grid-column: 1 / -1;}
    </style>
</head>
<body>

    <header class="fade-in">
        <div class="logo-container"><img src="logo.png" alt="Ju Dahmer Ateliê"></div>
        <div class="divisor-header"></div>
        <h1>Coleção Especial</h1>
        <h2>Amor que inspira. Presente que eterniza.</h2>
    </header>

    <main class="main-container">
        <div class="product-grid" id="productGrid">
            <div class="loading" id="loadingMsg">Carregando catálogo...</div>
        </div>
    </main>

    <a href="https://wa.me/41988367660" target="_blank" class="whatsapp-float">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"></path></svg>
    </a>

    <footer class="fade-in">
        <p class="footer-text">Feito para quem sempre cuidou de você.</p>
        <p class="footer-sub">Ju Dahmer Ateliê</p>
        <div class="heart-icon">♥</div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAA-4XzE079j_fE86vYz8Fy5m9CaOfuxLo",
            authDomain: "ju-dahmer-atelie.firebaseapp.com",
            projectId: "ju-dahmer-atelie",
            storageBucket: "ju-dahmer-atelie.firebasestorage.app",
            messagingSenderId: "1041012492925",
            appId: "1:1041012492925:web:776f980a6e4814d141ff14"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const WHATSAPP_NUM = "41988367660";
        const MSG_PADRAO = "Olá, tudo bem? Tenho interesse no ";

        async function carregarCatalogo() {
            const grid = document.getElementById('productGrid');
            const loading = document.getElementById('loadingMsg');
            
            try {
                const q = query(collection(db, "catalogo"), orderBy("dataCriacao", "desc"));
                const querySnapshot = await getDocs(q);
                loading.style.display = 'none';

                if (querySnapshot.empty) {
                    grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">Nenhum produto cadastrado no momento.</p>';
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const product = doc.data();
                    const linkWhats = `https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(MSG_PADRAO + product.nome)}`;
                    
                    const card = document.createElement('div');
                    card.className = 'card fade-in visible';
                    card.innerHTML = `
                        <div class="image-box">
                            <img src="${product.imagem}" alt="${product.nome}" loading="lazy">
                        </div>
                        <div class="info-box">
                            <h3 class="product-name">${product.nome}</h3>
                            <div class="divisor-card"></div>
                            <p class="product-price">${product.preco}</p>
                            <a href="${linkWhats}" target="_blank" class="btn-whatsapp">Comprar via WhatsApp</a>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                loading.innerText = "Erro ao carregar o catálogo.";
            }
        }

        window.onload = () => {
            carregarCatalogo();
            setTimeout(() => {
                document.querySelector('header').classList.add('visible');
                document.querySelector('footer').classList.add('visible');
            }, 100);
        };
    </script>
</body>
</html>
